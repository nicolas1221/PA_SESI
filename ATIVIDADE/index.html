<!DOCTYPE html>
<html>
<head>
    <title>Cadastro</title>
</head>
<body>

    <h2>Cadastro</h2>

    Nome: <input type="text" id="nome"><br><br>

    Sobrenome: <input type="text" id="sobrenome"><br><br>

    Idade: <input type="number" id="idade"><br><br>

    Profissão: <input type="text" id="profissao"><br><br>

    <button onclick="mostrar()">Enviar</button>

    <br><br>
    <span id="resultado"></span>

    <script>
        function mostrar() {
            var nome = document.getElementById("nome").value;
            var sobrenome = document.getElementById("sobrenome").value;
            var idade = document.getElementById("idade").value;
            var profissao = document.getElementById("profissao").value;

            document.getElementById("resultado").innerHTML =
            "BEM VINDO " + nome + " " + sobrenome +
            ", VOCÊ TEM " + idade +
            " ANOS E TRABALHA COMO " + profissao;
        }
    </script>

</body>
</html>
